name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Perl dependencies
        run: sudo apt-get update && sudo apt-get install -y libppi-perl

      - name: Build debashc
        run: cargo build

      - name: Run main (cargo) tests
        run: |
          set -o pipefail
          cargo test 2>&1 | tee cargo_test_output.txt || true

      - name: Run purify tests
        run: |
          perl test_purify.pl --all 2>&1 | tee purify_output.txt || true

      - name: Run fail script tests
        run: |
          chmod +x ./fail
          ./fail 2>&1 | tee fail_output.txt || true

      - name: Generate badge JSON
        run: |
          set -eu

          # If the test output files are missing (for example an earlier step
          # failed or was skipped), run the tests here as a fallback so the
          # badges reflect actual results.
          if [ ! -f cargo_test_output.txt ]; then
            echo "cargo_test_output.txt missing — running cargo test (fallback)"
            set -o pipefail
            cargo test 2>&1 | tee cargo_test_output.txt || true
          fi
          if [ ! -f purify_output.txt ]; then
            echo "purify_output.txt missing — running purify tests (fallback)"
            perl test_purify.pl --all 2>&1 | tee purify_output.txt || true
          fi
          if [ ! -f fail_output.txt ]; then
            echo "fail_output.txt missing — running fail script tests (fallback)"
            chmod +x ./fail
            ./fail 2>&1 | tee fail_output.txt || true
          fi

          # Parse cargo test output for passed/failed/ignored/measured
          main_passed=0
          main_failed=0
          main_ignored=0
          main_measured=0
          main_total=0
          if [ -f cargo_test_output.txt ]; then
            # Sum numbers across all "test result:" lines because cargo prints
            # one per test target. We want totals for the whole run, not a
            # single target's summary.
            summed=$(perl -nle '
              $p=$f=$i=$m=0;
              while (<>) {
                if (/test result:.*?([0-9]+)\s+passed.*?([0-9]+)\s+failed.*?([0-9]+)\s+ignored.*?([0-9]+)\s+measured/) {
                  $p += $1; $f += $2; $i += $3; $m += $4;
                }
              }
              print join(" ", $p, $f, $i, $m);
            ' cargo_test_output.txt || true)
            if [ -n "$summed" ]; then
              # Read summed values into variables
              IFS=' ' read -r main_passed main_failed main_ignored main_measured <<< "$summed"
              main_passed=${main_passed:-0}
              main_failed=${main_failed:-0}
              main_ignored=${main_ignored:-0}
              main_measured=${main_measured:-0}
              main_total=$((main_passed + main_failed + main_ignored + main_measured))
            fi
          fi
          main_passed=${main_passed:-0}
          main_total=${main_total:-0}
          if [ "${main_failed:-0}" -ne 0 ]; then
            color_main=red
          elif [ "$main_total" -eq 0 ]; then
            color_main=lightgrey
          else
            color_main=brightgreen
          fi

          # Parse purify output
          purify_passed=0
          purify_failed=0
          purify_tested=0
          purify_progress_passed=""
          purify_progress_matching=""
          if [ -f purify_output.txt ]; then
            line=$(grep -E '^Purify.pl tests:' purify_output.txt | tail -n1 || true)
            progress_line=$(grep -E '^PROGRESS ' purify_output.txt | tail -n1 || true)
            if [ -n "$line" ]; then
              purify_passed=$(echo "$line" | perl -nle 'print $1 if /Purify.pl tests: (\d+) passed/') || true
              purify_failed=$(echo "$line" | perl -nle 'print $1 if /, (\d+) failed/') || true
              purify_tested=$(echo "$line" | perl -nle 'print $1 if /, (\d+) tested$/') || true
            else
              # Fallback: if the final summary wasn't printed (the script died on
              # the first failure), estimate counts from PASSED:/FAILED: lines.
              purify_passed=$(grep -c '^PASSED:' purify_output.txt || true)
              purify_failed=$(grep -c '^FAILED:' purify_output.txt || true)
              purify_tested=$((purify_passed + purify_failed))
            fi
            if [ -n "$progress_line" ]; then
              purify_progress_passed=$(echo "$progress_line" | perl -nle 'print $1 if /^PROGRESS (\d+):(\d+)$/') || true
              purify_progress_matching=$(echo "$progress_line" | perl -nle 'print $2 if /^PROGRESS (\d+):(\d+)$/') || true
            fi
          fi
          purify_passed=${purify_passed:-0}
          purify_tested=${purify_tested:-0}
          if [ "${purify_failed:-0}" -ne 0 ]; then
            color_purify=red
          elif [ "$purify_tested" -eq 0 ]; then
            color_purify=lightgrey
          else
            color_purify=brightgreen
          fi

          mkdir -p .github/badges
          if [ "$main_total" -eq 0 ]; then
            printf '%s\n' "{\"schemaVersion\": 1, \"label\": \"main tests\", \"message\": \"no tests run\", \"color\": \"${color_main}\"}" > .github/badges/main-tests.json
          else
            printf '%s\n' "{\"schemaVersion\": 1, \"label\": \"main tests\", \"message\": \"${main_passed}/${main_total} passed\", \"color\": \"${color_main}\"}" > .github/badges/main-tests.json
          fi

          if [ "$purify_tested" -eq 0 ]; then
            printf '%s\n' "{\"schemaVersion\": 1, \"label\": \"purify tests\", \"message\": \"no tests run\", \"color\": \"${color_purify}\"}" > .github/badges/purify.json
          else
            printf '%s\n' "{\"schemaVersion\": 1, \"label\": \"purify tests\", \"message\": \"${purify_passed}/${purify_tested} passed\", \"color\": \"${color_purify}\"}" > .github/badges/purify.json
          fi

          # Purify progress badge: reports how far purify got and line-match quality
          color_purify_progress=lightgrey
          purify_progress_message="no progress data"
          if [ -n "$purify_progress_passed" ] && [ -n "$purify_progress_matching" ]; then
            color_purify_progress=orange
            purify_progress_message="${purify_progress_passed} passed, +${purify_progress_matching} lines"
          elif [ "$purify_tested" -gt 0 ]; then
            color_purify_progress=orange
            purify_progress_message="${purify_passed} passed"
          fi
          if [ "${purify_failed:-0}" -eq 0 ] && [ "$purify_tested" -gt 0 ]; then
            color_purify_progress=brightgreen
          fi
          printf '%s\n' "{\"schemaVersion\": 1, \"label\": \"purify progress\", \"message\": \"${purify_progress_message}\", \"color\": \"${color_purify_progress}\"}" > .github/badges/purify-progress.json

          # Parse fail-progress output ("how far before first failure")
          fail_progress_raw=""
          fail_progress_count=""
          fail_progress_complete=0

          if [ -f first_n_tests_passed.txt ]; then
            fail_progress_raw=$(head -n1 first_n_tests_passed.txt || true)
          fi

          if [ -n "$fail_progress_raw" ]; then
            fail_progress_count=$(echo "$fail_progress_raw" | perl -nle 'print $1 if /:[yn](\d+)/') || true
            if echo "$fail_progress_raw" | grep -Eq ':[y]99999$'; then
              fail_progress_complete=1
            fi
          fi

          if [ -z "$fail_progress_count" ] && [ -f fail_output.txt ]; then
            fail_progress_count=$(perl -nle 'if (/Successfully wrote (?:total )?test count (\d+)/) { $v = $1 } END { print $v if defined $v }' fail_output.txt || true)
          fi

          if [ -n "$fail_progress_count" ]; then
            fail_progress_count=$((10#$fail_progress_count))
          fi

          if [ "$fail_progress_complete" -eq 1 ]; then
            color_fail_progress=brightgreen
            fail_progress_message="complete"
          elif [ -n "$fail_progress_count" ]; then
            color_fail_progress=orange
            fail_progress_message="${fail_progress_count} before fail"
          else
            color_fail_progress=lightgrey
            fail_progress_message="no progress data"
          fi

          printf '%s\n' "{\"schemaVersion\": 1, \"label\": \"fail progress\", \"message\": \"${fail_progress_message}\", \"color\": \"${color_fail_progress}\"}" > .github/badges/fail-progress.json

      - name: Commit badges to gh-pages
        if: ${{ github.event_name == 'push' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Move generated badges out of the way so checkout won't fail due to
          # untracked files that would be overwritten by switching branches.
          TMPDIR=$(mktemp -d)
          mv .github/badges/*.json "$TMPDIR/" || true

          # Fetch remote gh-pages if it exists and create/update local branch
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout -B gh-pages
          fi

          # Restore badges and commit if they changed
          BRANCH_BADGE_DIR=$(printf '%s' "$GITHUB_REF_NAME" | perl -pe 's#/#__#g; s#[^A-Za-z0-9._-]#-#g; s#^\.+##; s#\.\.+#-#g')
          if [ -z "$BRANCH_BADGE_DIR" ]; then
            BRANCH_BADGE_DIR="unknown-branch"
          fi

          mkdir -p ".github/badges/branches/$BRANCH_BADGE_DIR"
          mv "$TMPDIR"/*.json ".github/badges/branches/$BRANCH_BADGE_DIR/" || true

          # Keep legacy root badge paths updated for compatibility.
          mkdir -p .github/badges
          cp ".github/badges/branches/$BRANCH_BADGE_DIR/"*.json .github/badges/ || true
          rm -rf "$TMPDIR" || true

          git add ".github/badges/branches/$BRANCH_BADGE_DIR"/*.json
          git add .github/badges/*.json
          if git diff --cached --quiet; then
            echo "No changes to badges, nothing to commit"
          else
            git commit -m "Update test badges for $GITHUB_REF_NAME"
            git push --set-upstream origin gh-pages
          fi
