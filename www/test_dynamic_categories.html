<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Categories Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .category {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .category h3 {
            margin-top: 0;
            color: #333;
        }
        .test-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }
        .test-item {
            background: #f5f5f5;
            padding: 8px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Dynamic Categories Test</h1>
    <p>This page demonstrates the dynamic categorization system based on actual test results.</p>
    
    <div id="status" class="status info">Loading categories...</div>
    
    <div id="categories"></div>
    
    <script type="module">
        import { getExamplesByCategory } from './examples.js';
        
        async function loadCategories() {
            const statusDiv = document.getElementById('status');
            const categoriesDiv = document.getElementById('categories');
            
            try {
                statusDiv.textContent = 'Loading categories...';
                statusDiv.className = 'status info';
                
                const categories = await getExamplesByCategory();
                
                statusDiv.textContent = 'Categories loaded successfully!';
                statusDiv.className = 'status success';
                
                // Display categories
                categoriesDiv.innerHTML = '';
                for (const [categoryName, tests] of Object.entries(categories)) {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';
                    
                    const title = document.createElement('h3');
                    title.textContent = `${categoryName} (${tests.length} tests)`;
                    categoryDiv.appendChild(title);
                    
                    const testList = document.createElement('div');
                    testList.className = 'test-list';
                    
                    tests.forEach(test => {
                        const testItem = document.createElement('div');
                        testItem.className = 'test-item';
                        testItem.textContent = test;
                        testList.appendChild(testItem);
                    });
                    
                    categoryDiv.appendChild(testList);
                    categoriesDiv.appendChild(categoryDiv);
                }
                
            } catch (error) {
                statusDiv.textContent = `Error loading categories: ${error.message}`;
                statusDiv.className = 'status error';
                console.error('Error:', error);
            }
        }
        
        // Load categories when page loads
        loadCategories();
        
        // Add refresh button
        const refreshButton = document.createElement('button');
        refreshButton.textContent = 'Refresh Categories';
        refreshButton.onclick = loadCategories;
        refreshButton.style.cssText = 'margin: 20px 0; padding: 10px 20px; font-size: 16px;';
        document.body.insertBefore(refreshButton, document.getElementById('categories'));
    </script>
</body>
</html>
